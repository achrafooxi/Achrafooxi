<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ita Pizza Ultimate</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f0f0f;
  color:white;
}

/* HEADER */
.header{
  text-align:center;
  padding:15px;
  background:#111;
  color:#ffcc00;
  font-size:22px;
  position:sticky;
  top:0;
}

/* INPUTS */
.inputs{
  padding:10px;
}
input,select,textarea{
  width:100%;
  margin:5px 0;
  padding:10px;
  border-radius:10px;
  border:none;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  padding:10px;
}

/* CARD */
.card{
  background:#1c1c1c;
  border-radius:15px;
  overflow:hidden;
}

.card img{
  width:100%;
  height:100px;
  object-fit:cover;
}

.card-body{
  padding:10px;
}

.price{
  color:#00ffcc;
  font-weight:bold;
}

.controls{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

button{
  background:#ff2a2a;
  border:none;
  padding:5px 10px;
  border-radius:8px;
  color:white;
}

/* OPTIONS */
.options{
  font-size:12px;
  margin-top:5px;
}

/* CART */
.cart{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:#111;
  padding:10px;
  border-top:2px solid red;
}
</style>
</head>

<body>

<div class="header">🍕 Ita Pizza Ultimate</div>

<div class="inputs">
<input id="name" placeholder="Nome cliente">
<input id="address" placeholder="Indirizzo">
<button onclick="getLocation()">📍 GPS</button>

<select id="time">
<option>Subito</option>
<option>30 min</option>
<option>1 ora</option>
</select>

<select id="payment">
<option>Contanti</option>
<option>Carta</option>
</select>

<textarea id="note" placeholder="Note..."></textarea>
</div>

<div class="grid" id="menu"></div>

<div class="cart">
<div id="cart"></div>
<b>Totale: €<span id="total">0</span></b><br>
<button onclick="send()">📲 Ordina Ora</button>
</div>

<script>
const pizzas=[
{name:"Margherita",price:5.5,img:"https://images.unsplash.com/photo-1601924928376-62c6c0d4b2b2"},
{name:"Diavola",price:7,img:"https://images.unsplash.com/photo-1594007654729-407eedc4be65"},
{name:"Capricciosa",price:8,img:"https://images.unsplash.com/photo-1548365328-8b849f9d7b5f"},
{name:"4 Formaggi",price:8,img:"https://images.unsplash.com/photo-1601924582975-7e6b2b5b3c6a"},
{name:"Americana",price:7,img:"https://images.unsplash.com/photo-1593560708920-61dd98c46a4e"},
{name:"Boscaiola",price:10.5,img:"https://images.unsplash.com/photo-1565299624946-b28f40a0ae38"}
];

let cart={};

function renderMenu(){
  let html="";
  pizzas.forEach((p,i)=>{
    html+=`
    <div class="card">
      <img src="${p.img}">
      <div class="card-body">
        <b>${p.name}</b><br>
        <span class="price">€${p.price}</span>

        <div class="options">
          Size:
          <select id="size${i}">
            <option value="1">S</option>
            <option value="1.2">M</option>
            <option value="1.5">L</option>
          </select><br>

          Extra:
          <input type="checkbox" id="cheese${i}"> 🧀 +1€ 
          <input type="checkbox" id="meat${i}"> 🍖 +2€
        </div>

        <div class="controls">
          <button onclick="remove(${i})">-</button>
          <span id="q${i}">0</span>
          <button onclick="add(${i})">+</button>
        </div>
      </div>
    </div>`;
  });
  document.getElementById("menu").innerHTML=html;
}

function calcPrice(i){
  let base=pizzas[i].price;
  let size=document.getElementById("size"+i).value;
  let total=base*size;

  if(document.getElementById("cheese"+i).checked) total+=1;
  if(document.getElementById("meat"+i).checked) total+=2;

  return total;
}

function add(i){
  if(!cart[i]) cart[i]=0;
  cart[i]++;
  update();
}

function remove(i){
  if(cart[i]){
    cart[i]--;
    if(cart[i]<=0) delete cart[i];
  }
  update();
}

function update(){
  let total=0;
  let html="";

  pizzas.forEach((p,i)=>{
    let q=cart[i]||0;
    document.getElementById("q"+i).innerText=q;

    if(q>0){
      let price=calcPrice(i);
      total+=price*q;
      html+=`${p.name} x${q} (€${price.toFixed(2)})<br>`;
    }
  });

  document.getElementById("cart").innerHTML=html;
  document.getElementById("total").innerText=total.toFixed(2);
}

function getLocation(){
  navigator.geolocation.getCurrentPosition(pos=>{
    document.getElementById("address").value=
    pos.coords.latitude+","+pos.coords.longitude;
  });
}

function send(){
  let name=document.getElementById("name").value;
  let address=document.getElementById("address").value;

  if(!name || !address){
    alert("Compila i dati!");
    return;
  }

  let msg="Ordine:%0A";
  msg+="Nome: "+name+"%0A";
  msg+="Indirizzo: "+address+"%0A";
  msg+="Tempo: "+document.getElementById("time").value+"%0A";
  msg+="Pagamento: "+document.getElementById("payment").value+"%0A%0A";

  pizzas.forEach((p,i)=>{
    if(cart[i]){
      msg+=p.name+" x"+cart[i]+"%0A";
    }
  });

  window.open("https://wa.me/393882558000?text="+msg);
}

renderMenu();
</script>

</body>
</html>
