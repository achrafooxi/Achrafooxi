<!DOCTYPE html>
<html>
<head>
  <title>achrafooxi</title>

  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial;
      text-align: center;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
    }

    .content {
      position: relative;
      z-index: 1;
      padding-top: 80px;
    }

    h1 {
      color: #00ffcc;
      font-size: 40px;
      text-shadow: 0 0 10px #00ffcc;
    }

    .typing {
      color: #aaa;
      margin: 10px;
    }

    .btn {
      display: inline-block;
      margin: 10px;
      padding: 10px 20px;
      background: #00ffcc;
      color: black;
      border-radius: 25px;
      text-decoration: none;
      transition: 0.3s;
    }

    .btn:hover {
      transform: scale(1.1);
    }

    .games {
      margin-top: 30px;
    }

    /* 🧮 Calculator */
    .calculator {
      margin-top: 50px;
    }

    #display {
      width: 200px;
      height: 40px;
      font-size: 20px;
      text-align: right;
      margin-bottom: 10px;
    }

    .calc-btn {
      width: 45px;
      height: 45px;
      margin: 3px;
      font-size: 18px;
      background: #00ffcc;
      border: none;
      border-radius: 10px;
    }

  </style>
</head>

<body>

<canvas id="stars"></canvas>

<div class="content">

  <h1>🚀 achrafooxi</h1>
  <div class="typing" id="text"></div>

  <a href="https://instagram.com/achrafooxi" target="_blank" class="btn">
    📸 Seguimi su Instagram
  </a>

  <div class="games">
    <h2>🎮 Giochi</h2>

    <a href="https://playsnake.org/" target="_blank" class="btn">🐍 Snake</a>
    <a href="https://www.mathsisfun.com/games/tetris.html" target="_blank" class="btn">🧠 Tetris</a>
    <a href="https://www.onlinegames.io/games/2021/2/traffic-run/index.html" target="_blank" class="btn">🚗 Car Game</a>
  </div>

  <!-- 🧮 Calculator -->
  <div class="calculator">
    <h2>🧮 Calcolatrice</h2>

    <input type="text" id="display" disabled><br>

    <button class="calc-btn" onclick="add('7')">7</button>
    <button class="calc-btn" onclick="add('8')">8</button>
    <button class="calc-btn" onclick="add('9')">9</button>
    <button class="calc-btn" onclick="add('/')">/</button><br>

    <button class="calc-btn" onclick="add('4')">4</button>
    <button class="calc-btn" onclick="add('5')">5</button>
    <button class="calc-btn" onclick="add('6')">6</button>
    <button class="calc-btn" onclick="add('*')">*</button><br>

    <button class="calc-btn" onclick="add('1')">1</button>
    <button class="calc-btn" onclick="add('2')">2</button>
    <button class="calc-btn" onclick="add('3')">3</button>
    <button class="calc-btn" onclick="add('-')">-</button><br>

    <button class="calc-btn" onclick="add('0')">0</button>
    <button class="calc-btn" onclick="add('.')">.</button>
    <button class="calc-btn" onclick="calculate()">=</button>
    <button class="calc-btn" onclick="add('+')">+</button><br>

    <button class="calc-btn" onclick="clearDisplay()">C</button>
  </div>

</div>

<script>
  // ⭐ Stars
  const canvas = document.getElementById("stars");
  const ctx = canvas.getContext("2d");

  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  let stars = [];

  for (let i = 0; i < 100; i++) {
    stars.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: Math.random() * 2
    });
  }

  function drawStars() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "white";
    stars.forEach(s => {
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fill();
      s.y += 0.5;
      if (s.y > canvas.height) s.y = 0;
    });
    requestAnimationFrame(drawStars);
  }

  drawStars();

  // ⌨️ Typing
  const text = "Sto creando il mio futuro digitale... 🔥";
  let i = 0;

  function typing() {
    if (i < text.length) {
      document.getElementById("text").innerHTML += text.charAt(i);
      i++;
      setTimeout(typing, 50);
    }
  }

  typing();

  // 🧮 Calculator
  function add(value) {
    document.getElementById("display").value += value;
  }

  function calculate() {
    try {
      document.getElementById("display").value = eval(document.getElementById("display").value);
    } catch {
      alert("Errore");
    }
  }

  function clearDisplay() {
    document.getElementById("display").value = "";
  }
</script>

</body>
</html>
