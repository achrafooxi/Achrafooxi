<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ita Pizza Pro</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f0f0f;
  color:white;
}

/* header */
.header{
  text-align:center;
  padding:15px;
  background:#111;
  font-size:24px;
  color:#ffcc00;
  position:sticky;
  top:0;
}

/* inputs */
.inputs{
  padding:10px;
}
input,textarea{
  width:100%;
  margin:5px 0;
  padding:10px;
  border-radius:10px;
  border:none;
}

/* menu */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  padding:10px;
}

.card{
  background:#1c1c1c;
  border-radius:15px;
  overflow:hidden;
  box-shadow:0 5px 10px black;
}

.card img{
  width:100%;
  height:100px;
  object-fit:cover;
}

.card-body{
  padding:10px;
}

.price{
  color:#00ffcc;
}

.controls{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

button{
  background:#ff2a2a;
  border:none;
  padding:5px 10px;
  border-radius:8px;
  color:white;
}

/* cart */
.cart{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:#111;
  padding:10px;
  border-top:2px solid red;
}
</style>
</head>

<body>

<div class="header">🍕 Ita Pizza Pro</div>

<div class="inputs">
<input id="name" placeholder="Nome cliente">
<input id="address" placeholder="Indirizzo">
<textarea id="note" placeholder="Note (senza cipolla, extra formaggio...)"></textarea>
</div>

<div class="grid" id="menu"></div>

<div class="cart">
<div id="cart"></div>
<b>Totale: €<span id="total">0</span></b><br>
<button onclick="send()">📲 Ordina</button>
</div>

<script>
const pizzas=[
{name:"Margherita",price:5.5,img:"https://images.unsplash.com/photo-1601924928376-62c6c0d4b2b2"},
{name:"Diavola",price:7,img:"https://images.unsplash.com/photo-1594007654729-407eedc4be65"},
{name:"Capricciosa",price:8,img:"https://images.unsplash.com/photo-1548365328-8b849f9d7b5f"},
{name:"Quattro Formaggi",price:8,img:"https://images.unsplash.com/photo-1601924582975-7e6b2b5b3c6a"},
{name:"Americana",price:7,img:"https://images.unsplash.com/photo-1593560708920-61dd98c46a4e"},
{name:"Tonno e Cipolla",price:7.5,img:"https://images.unsplash.com/photo-1574071318508-1cdbab80d002"},
{name:"Boscaiola",price:10.5,img:"https://images.unsplash.com/photo-1565299624946-b28f40a0ae38"},
{name:"Crudo",price:9,img:"https://images.unsplash.com/photo-1571091718767-18b5b1457add"},
{name:"Mediterranea",price:15,img:"https://images.unsplash.com/photo-1590947132387-155cc02f3212"},
{name:"Noci Pera",price:8.5,img:"https://images.unsplash.com/photo-1604382355076-af4b0eb60143"},
{name:"Calzone",price:6.5,img:"https://images.unsplash.com/photo-1604908177522-402c5b0c6f74"},
{name:"Panino Kebab",price:6,img:"https://images.unsplash.com/photo-1606755962773-0b8dcbf97f96"}
];

let cart={};

function renderMenu(){
  let html="";
  pizzas.forEach((p,i)=>{
    html+=`
    <div class="card">
      <img src="${p.img}">
      <div class="card-body">
        <b>${p.name}</b><br>
        <span class="price">€${p.price}</span>
        <div class="controls">
          <button onclick="remove(${i})">-</button>
          <span id="q${i}">0</span>
          <button onclick="add(${i})">+</button>
        </div>
      </div>
    </div>`;
  });
  document.getElementById("menu").innerHTML=html;
}

function add(i){
  if(!cart[i]) cart[i]=0;
  cart[i]++;
  update();
}

function remove(i){
  if(cart[i]){
    cart[i]--;
    if(cart[i]<=0) delete cart[i];
  }
  update();
}

function update(){
  let total=0;
  let html="";
  pizzas.forEach((p,i)=>{
    let q=cart[i]||0;
    document.getElementById("q"+i).innerText=q;
    if(q>0){
      total+=p.price*q;
      html+=`${p.name} x${q}<br>`;
    }
  });
  document.getElementById("cart").innerHTML=html;
  document.getElementById("total").innerText=total.toFixed(2);
}

function send(){
  let name=document.getElementById("name").value;
  let address=document.getElementById("address").value;
  let note=document.getElementById("note").value;

  let msg="Ordine:%0A";
  msg+="Nome: "+name+"%0A";
  msg+="Indirizzo: "+address+"%0A";
  msg+="Note: "+note+"%0A%0A";

  pizzas.forEach((p,i)=>{
    if(cart[i]){
      msg+=p.name+" x"+cart[i]+"%0A";
    }
  });

  window.open("https://wa.me/393882558000?text="+msg);
}

renderMenu();
</script>

</body>
</html>
